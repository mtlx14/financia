<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>FinancIA · post-outro</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=jetbrains-mono@400,500&display=swap" rel="stylesheet">
<style>
/* ───────── design tokens (auto-extraídos de manual-marca.html) ───────── */
:root {
  /* ════════════════════════════════════
     CAPA 1 · PRIMITIVOS (compartidos)
     Valores crudos. Paleta de "lo permitido".
     ════════════════════════════════════ */

  /* — Tipografía: familias — */
  --font-display: 'Satoshi', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* — Tipografía: tamaños — */
  --text-xxs:     24px;
  --text-xs:      28px;
  --text-sm:      30px;
  --text-md:      38px;
  --text-base:    48px;
  --text-lg:      76px;
  --text-xl:     120px;
  --text-display: 200px;

  /* — Tipografía: pesos — */
  --weight-light:   300;
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-bold:    700;
  --weight-black:   900;

  /* — Tipografía: tracking — */
  --track-tightest: -0.06em;
  --track-tight:    -0.04em;
  --track-tighter:  -0.03em;
  --track-snug:     -0.02em;
  --track-normal:    0;
  --track-wide:      0.04em;
  --track-wider:     0.08em;
  --track-widest:    0.1em;

  /* — Color: semánticos (cross-theme) — */
  --positive: #3DAA47;
  --negative: #E84C3D;
  --warning:  #F5B400;

  /* — Color: constantes (cross-theme) — */
  --white: #FFFFFF;

  /* — Radii — */
  --radius-sm:    6px;
  --radius-md:    8px;
  --radius-lg:   16px;
  --radius-pill: 999px;
  --radius-full:  50%;

  /* — Espaciado (escala base 4px) — */
  --space-0:     0;
  --space-1:    12px;
  --space-2:    24px;
  --space-3:    32px;
  --space-4:    44px;
  --space-5:    56px;
  --space-6:    64px;
  --space-7:    76px;
  --space-8:    88px;
  --space-9:    96px;
  --space-10:  108px;
  --space-12:  132px;
  --space-15:  164px;
  --space-20:  220px;
  --space-25:  272px;

  /* — Sombras — */
  --shadow-sm:   0 8px 32px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md:   0 12px 40px rgba(0,0,0,0.25);
  --shadow-lg:   0 24px 64px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.05);
  --shadow-glow: 0 0 8px var(--brand);

  /* — Movimiento — */
  --ease-out:  cubic-bezier(.2,.8,.2,1);
  --dur-fast:  0.2s;
  --dur-base:  0.3s;
  --dur-slow:  0.4s;

  /* — Pixelmark (FinancIA · grid 3×3, 3 niveles de opacidad) — */
  --pixelmark-opacity-low:  0.22;
  --pixelmark-opacity-mid:  0.55;
  --pixelmark-opacity-full: 1;

  /* Escala de tamaños del pixelmark · usar el token, no px crudos */
  --pixelmark-xs:   56px;   /* esquinas de posts, badges chicos */
  --pixelmark-sm:   76px;   /* nav, headers compactos */
  --pixelmark-md:  128px;   /* default del pack, uso general */
  --pixelmark-lg:  256px;   /* hero, splash */
  --pixelmark-xl:  380px;   /* sección logo, presentaciones */

  /* ════════════════════════════════════
     CAPA 2 · SEMÁNTICOS
     Aliases con intención. Conectan
     primitivos con su rol en la marca.
     ════════════════════════════════════ */

  /* — Tipografía con rol — */
  --type-display:   var(--text-display);
  --type-headline:  var(--text-lg);
  --type-headline-lg: var(--text-xl);
  --type-stat:      var(--text-lg);
  --type-body:      var(--text-base);
  --type-body-sm:   var(--text-md);
  --type-label:     var(--text-xs);
  --type-label-sm:  var(--text-xxs);

  /* — Pesos con rol — */
  --weight-body:     var(--weight-light);
  --weight-emphasis: var(--weight-bold);
  --weight-display:  var(--weight-black);

  /* — Tracking con rol — */
  --track-display:   var(--track-tight);
  --track-headline:  var(--track-snug);
  --track-label:     var(--track-wider);

  /* — Superficies (resuelven dinámicamente al tema activo) — */
  --surface-base:   var(--cream);
  --surface-soft:   var(--bone);
  --surface-dark:   var(--ink);
  --surface-brand:  var(--brand);

  /* — Texto según contexto — */
  --text-default:   var(--ink);
  --text-muted:     var(--graphite);
  --text-subtle:    var(--stone);
  --text-on-dark:   var(--white);
  --text-on-brand:  var(--on-brand);

  /* — Espaciado con rol — */
  --space-card-pad-y:  var(--space-9);   /* 96px - padding vertical de cards */
  --space-card-pad-x:  var(--space-8);   /* 88px - padding horizontal */
  --space-section:     var(--space-20);  /* 80px - separación entre secciones */
  --space-stack-sm:    var(--space-2);   /*  8px - gap pequeño */
  --space-stack-md:    var(--space-4);   /* 16px - gap medio */
  --space-stack-lg:    var(--space-6);   /* 24px - gap grande */
}

/* ===== Paleta · verde esmeralda + neutros tintados ===== */
:root {
  /* Marca */
  --brand:        #00E664;
  --brand-bright: #2EEB80;
  --brand-deep:   #00B850;
  --brand-soft:   #A7F3D0;
  --brand-pale:   #D1FAE5;
  --brand-rgb:    0, 230, 100;
  --on-brand:     #FFFFFF;

  /* Neutros (tintados cálidos para contrastar con el verde) */
  --ink:      #0C1410;
  --charcoal: #1A2620;
  --graphite: #3D4A43;
  --stone:    #7A8580;
  --mist:     #C8D2CC;
  --bone:     #ECF0EB;
  --cream:    #F5F7F2;
}

/* ───────── reset mínimo + viewport ───────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px;
  height: 1080px;
  background: var(--cream);
  font-family: var(--font-display);
  -webkit-font-smoothing: antialiased;
  font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
}
.ig-post { width: 1080px; height: 1080px; border-radius: 0; }

/* ───────── reglas del preset post-outro ───────── */
.brand-wordmark {
  font-family: var(--font-display);
  font-weight: var(--weight-display);
  letter-spacing: var(--track-display);
  color: var(--ink);
  display: inline-flex;
  align-items: baseline;
  white-space: nowrap;
  line-height: 1;
}

.brand-wordmark .ia {
  background: var(--brand);
  color: var(--ink);
  padding: 0.04em 0.18em;
  border-radius: calc(var(--radius-sm) * 0.6);
  margin-left: 0.04em;
}

.brand-wordmark.on-dark { color: var(--white); }

.brand-wordmark.on-brand { color: var(--ink); }

.brand-wordmark.on-brand .ia { background: var(--ink); color: var(--brand); }

.brand-wordmark.color .ia { background: transparent; color: var(--brand); padding: 0; }

.brand-wordmark.color.on-dark .ia { color: var(--brand); }

.ig-post > .post-corner-mark {
  position: absolute;
  top:   var(--space-card-pad-y);
  right: var(--space-card-pad-x);
  bottom: auto;
  left: auto;
  --pixelmark-size: var(--pixelmark-xs);
  --pixelmark-color: var(--brand);
  z-index: 3;
}

.ig-post > .post-corner-mark.top-left     { left:  var(--space-card-pad-x); right: auto; }

.ig-post > .post-corner-mark.bottom-right { top: auto; bottom: var(--space-card-pad-y); }

.ig-post > .post-corner-mark.bottom-left  { top: auto; bottom: var(--space-card-pad-y); left: var(--space-card-pad-x); right: auto; }

.ig-post {
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.post-outro {
  background: var(--ink);
  color: var(--white);
  padding: var(--space-card-pad-y) var(--space-card-pad-x);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  container-type: inline-size;
}

.post-outro::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: var(--space-15) var(--space-15);
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  pointer-events: none;
}

.post-outro > * { position: relative; z-index: 1; }

.post-outro-meta {
  font-family: var(--font-mono);
  font-size: var(--type-label);
  text-transform: uppercase;
  letter-spacing: var(--track-widest);
  color: var(--white);
  opacity: 0.5;
  align-self: stretch;
  display: flex;
  justify-content: space-between;
}

.post-outro-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-5);
}

.post-outro .brand-wordmark {
  font-size: 14cqw;                 /* one-off · escala con el contenedor (≈151px @1080) */
  line-height: 1;
}

.post-outro-handle {
  font-family: var(--font-mono);
  font-size: var(--type-body);
  font-weight: var(--weight-emphasis);
  letter-spacing: var(--track-wider);
  color: var(--brand);
}

.post-outro-tagline {
  font-family: var(--font-mono);
  font-size: var(--type-label);
  text-transform: uppercase;
  letter-spacing: var(--track-widest);
  color: var(--white);
  opacity: 0.5;
}

.post-outro-cta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-6);
  background: var(--brand);
  color: var(--ink);
  border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: var(--type-label);
  font-weight: var(--weight-bold);
  text-transform: uppercase;
  letter-spacing: var(--track-wider);
}
</style>
</head>
<body>
<div class="ig-post post-outro post-outro--theme-ink post-outro--layout-stacked">
  <div class="post-outro-meta">
    <span data-slot="meta_left">// FIN</span>
    <span data-slot="meta_right">2026</span>
  </div>
  <div class="post-outro-stack">
    <span class="brand-wordmark on-dark">Financ<span class="ia">IA</span></span>
    <div class="post-outro-handle">@financia.chile</div>
    <div class="post-outro-tagline" data-slot="tagline">Educación financiera · Chile</div>
  </div>
  <span class="post-outro-cta" data-slot="cta">Sígueme →</span>
</div>
</body>
</html>
